[base]
env_name = double_pendulum

[vec]
total_agents = 4096
num_buffers = 4
num_threads = 16

[env]
cart_mass = 1.0
link1_mass = 0.1
link2_mass = 0.1
link1_length = 0.5
link2_length = 0.5
gravity = 9.8
force_mag = 10.0
dt = 0.02

[policy]
hidden_size = 128
num_layers = 2
expansion_factor = 1

[torch]
network = MLP
encoder = DefaultEncoder
decoder = DefaultDecoder

[train]
gpus = 1
seed = 42
total_timesteps = 20000000
learning_rate = 0.001
anneal_lr = 1
min_lr_ratio = 0
gamma = 0.99
gae_lambda = 0.95
replay_ratio = 1
clip_coef = 0.2
vf_coef = 0.5
vf_clip_coef = 1.0
max_grad_norm = 0.5
ent_coef = 0.001
beta1 = 0.9
beta2 = 0.999
eps = 1e-8
minibatch_size = 16384
horizon = 64
vtrace_rho_clip = 1.0
vtrace_c_clip = 1.0
prio_alpha = 0.5
prio_beta0 = 0.5

[sweep]
method = Protein
metric = perf
goal = maximize
