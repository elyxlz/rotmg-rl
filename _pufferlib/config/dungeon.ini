# PufferLib config for the rotmg Snake Pit dungeon env (lives in this vendored tree). Merged on top
# of config/default.ini (missing keys inherit the default). [env] supplies every kwarg my_init()
# reads via dict_get — all are REQUIRED (default.ini's [env] is empty). Override any at the CLI,
# e.g. `puffer train dungeon --env.boss_hp_max 300 --env.boss_shoots 0 --train.total-timesteps 5e6`.
[base]
env_name = dungeon

[vec]
total_agents = 1024
num_buffers = 2
num_threads = 16

[env]
player_speed = 0.773
player_radius = 0.5
max_steps = 4000
activation_range = 20.0
spawn_in_room_prob = 0.0
random_spawn_prob = 0.0
spawn_in_room_radius = 6.0
player_hp_max = 670.0
player_mp_max = 455.0
player_defense = 25.0
damage_floor = 0.1
mp_regen = 1.78
hp_regen = 1.54
staff_cooldown = 1.25
staff_num = 2
staff_dmg_lo = 90.0
staff_dmg_hi = 170.0
staff_speed = 1.8
staff_life = 4.75
staff_radius = 0.5
staff_offset = 0.5
spell_cost = 90.0
spell_cooldown = 0
spell_num = 20
spell_dmg_lo = 95.0
spell_dmg_hi = 185.0
spell_speed = 1.6
spell_life = 10
n_snakes = 200
n_snakes_jitter = 0
snake_speed = 0.15
snake_radius = 0.5
boss_hp_max = 7500.0
boss_radius = 2.0
boss_defense = 19.0
boss_wander_speed = 0.15
boss_return_speed = 0.35
boss_shoots = 1
opening_invuln_ticks = 10
invuln_ticks = 15
blade_cd = 15
blade_radius_p1 = 2.0
blade_radius_p3 = 30.0
ebullet_speed = 0.7
ebullet_life = 15
ebullet_dmg = 100.0
ebullet_radius = 0.4
max_bullets = 8192
grenade_fuse = 15
grenade_cd_p1 = 15
grenade_cd_p2 = 10
grenade_cd_p3_diag = 30
grenade_range_confuse = 11.0
grenade_petrify_dist = 6.0
grenade_radius_confuse = 3.5
grenade_dmg_confuse = 150.0
grenade_radius_petrify = 1.5
grenade_dmg_petrify = 75.0
confused_ticks = 10
petrify_ticks = 10
minion_max = 5
minion_cd = 15
minion_hp = 30.0
enable_swarm = 0
swarm_max = 5
swarm_cd = 15
swarm_fire_cd = 8
swarm_radius = 15.0
swarm_hp = 1000.0
swarm_def = 4.0
swarm_dmg = 40.0
swarm_speed = 0.5
enable_grenades = 1
enable_minions = 0
rew_explore = 0.01
rew_kill = 0.1
rew_boss_dmg = 1.0
rew_reach = 0.3
rew_survive = 0.0
rew_damage_taken = 0.5
rew_clear = 1.0
rew_speed = 0.2
rew_death = 0.5
rew_step = -0.001
rew_approach = 0.0

[policy]
hidden_size = 256
num_layers = 1
expansion_factor = 1

[torch]
network = LSTM
encoder = DungeonEncoder
decoder = DefaultDecoder

[train]
total_timesteps = 50_000_000
learning_rate = 0.015
gamma = 0.995
gae_lambda = 0.90
ent_coef = 0.02
# 1024 is a safe minibatch default; the --slowly torch CNN is fine at any size. B_TT = minibatch_size.
minibatch_size = 1024
horizon = 64
