# PufferLib config for the server-as-sim env (passthrough to the C# betterSkillys server
# over shm + the redis lockstep gate). Merged on top of config/default.ini. The obs layout
# is identical to dungeon, so the SAME DungeonEncoder + LSTM policy trains on it unchanged.
#
# total_agents == N: it sizes the shm region (server side: SIM_WORLDS=N), the number of
# Snake Pit worlds, AND the encoder batch. Keep num_buffers = 1 (one global lockstep gate).
[base]
env_name = server_env

[vec]
total_agents = 4
num_buffers = 1
num_threads = 1
backend = Serial

[env]
# n_agents is overridden by my_vec_init from vec.total_agents; present so load_config has it.
n_agents = 4
max_steps = 4000
redis_port = 6390
redis_db = 5

[policy]
hidden_size = 256
num_layers = 1
expansion_factor = 1

[torch]
network = LSTM
encoder = DungeonEncoder
decoder = DefaultDecoder

[train]
total_timesteps = 5_000_000
learning_rate = 0.015
gamma = 0.995
gae_lambda = 0.90
ent_coef = 0.02
minibatch_size = 256
horizon = 64
device = cuda
