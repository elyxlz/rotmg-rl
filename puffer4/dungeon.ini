# PufferLib 4.0 config for the rotmg Snake Pit dungeon env.
# Copied to <PufferLib clone>/config/dungeon.ini by scripts/setup_box_puffer4.sh. Merged on top of
# the clone's config/default.ini (missing keys inherit the default). [env] supplies every kwarg
# my_init() reads via dict_get — all are REQUIRED (default.ini's [env] is empty). Override any at the
# CLI, e.g. `puffer train dungeon --env.boss_hp_max 300 --env.boss_shoots 0 --train.total-timesteps 5e6`.
[base]
env_name = dungeon

[vec]
total_agents = 1024
num_buffers = 2
num_threads = 16

[env]
player_speed = 0.55
player_radius = 0.4
max_steps = 4000
activation_range = 20.0
spawn_in_room_prob = 0.0
random_spawn_prob = 0.0
player_hp_max = 670.0
player_mp_max = 385.0
mp_regen = 0.5
staff_cooldown = 2
staff_num = 2
staff_dmg_lo = 45.0
staff_dmg_hi = 85.0
staff_speed = 1.8
staff_life = 8
staff_radius = 0.5
staff_offset = 0.5
spell_cost = 100.0
spell_cooldown = 5
spell_num = 20
spell_arc_deg = 70.0
spell_dmg_lo = 110.0
spell_dmg_hi = 205.0
spell_speed = 1.6
spell_life = 10
n_snakes = 40
snake_hp = 5.0
snake_speed = 0.2
snake_shoot_range = 8.0
snake_cooldown = 10
snake_bullet_speed = 0.6
snake_bullet_life = 12
snake_bullet_dmg = 20.0
snake_radius = 0.5
boss_hp_max = 7500.0
boss_radius = 2.0
boss_speed = 0.12
boss_shoots = 1
invuln_ticks = 15
ebullet_speed = 0.7
ebullet_life = 15
ebullet_dmg = 40.0
ebullet_radius = 0.4
max_bullets = 8192
grenade_fuse = 10
grenade_cd_p1 = 15
grenade_cd_p2 = 10
grenade_radius_confuse = 3.5
grenade_dmg_confuse = 150.0
grenade_radius_petrify = 1.5
grenade_dmg_petrify = 75.0
confused_ticks = 10
petrify_ticks = 10
minion_max = 5
minion_cd = 15
minion_hp = 30.0
enable_grenades = 1
enable_minions = 1
rew_explore = 0.01
rew_kill = 0.1
rew_boss_dmg = 1.0
rew_reach = 0.3
rew_survive = 0.0
rew_damage_taken = 0.5
rew_clear = 1.0
rew_death = 0.5
rew_step = -0.001
rew_approach = 0.0

[policy]
hidden_size = 256
num_layers = 1
expansion_factor = 1

[torch]
network = LSTM
encoder = DungeonEncoder
decoder = DefaultDecoder

[train]
total_timesteps = 50_000_000
learning_rate = 0.015
gamma = 0.995
gae_lambda = 0.90
ent_coef = 0.02
# 1024: the native CUDA CNN encoder (puffer4/dungeon_encoder.cu) is stable + learns at minibatch
# <=1024; larger (e.g. 4096) hits a numerical divergence in the native im2col conv path (NaN after a
# few updates; correct under compute-sanitizer -> a size-dependent hazard, see docs). The --slowly
# torch CNN is fine at any minibatch. B_TT = minibatch_size.
minibatch_size = 1024
horizon = 64
