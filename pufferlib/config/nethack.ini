[base]
env_name = nethack

[vec]
total_agents = 4096
num_buffers = 2
num_threads = 16
seed = 73

[env]
# Reward shaping. Each coef is independently toggleable: set to 0 to disable
# the term. See ocean/nethack/REWARDS.md for the recipe + future candidates.
# CLI: --env.score-coef, --env.descent-coef, --env.scout-coef, --env.illegal-penalty
score_coef = 0.01
descent_coef = 10.0
scout_coef = 0.1
illegal_penalty = -0.1

[policy]
hidden_size = 512
num_layers = 4
expansion_factor = 2

[train]
gpus = 1
seed = 42
total_timesteps = 1443360107
learning_rate = 0.00224872
anneal_lr = 1
min_lr_ratio = 0
gamma = 0.99816
gae_lambda = 0.696214
replay_ratio = 2.2381
clip_coef = 0.20
vf_coef = 0.1
vf_clip_coef = 0.01
max_grad_norm = 1.14364
ent_coef = 0.10
beta1 = 0.981226
beta2 = 0.994178
eps = 1.82223e-06
minibatch_size = 32768
horizon = 256
vtrace_rho_clip = 3.24229
vtrace_c_clip = 3.95664
prio_alpha = 1
prio_beta0 = 0.555562
env = 0

[sweep]
method = Random
metric = depth
goal = maximize
downsample = 4
max_runs = 2
gpus = 1
max_suggestion_cost = 1500

[sweep.env.score_coef]
distribution = log_normal
min = 0.001
mean = 0.01
max = 0.1
scale = auto

[sweep.env.descent_coef]
distribution = uniform
min = 0.0
mean = 10.0
max = 50.0
scale = auto

[sweep.env.scout_coef]
distribution = uniform
min = 0.0
mean = 0.1
max = 2.0
scale = auto

[sweep.env.illegal_penalty]
distribution = uniform
min = -2.0
mean = -0.5
max = 0.0
scale = auto

[sweep.train.learning_rate]
distribution = log_normal
min = 0.0001
mean = 0.002
max = 0.01
scale = auto

[sweep.train.gamma]
distribution = uniform
min = 0.99
mean = 0.998
max = 0.9999
scale = auto

[sweep.train.gae_lambda]
distribution = uniform
min = 0.5
mean = 0.7
max = 0.99
scale = auto

[sweep.train.ent_coef]
distribution = log_normal
min = 0.001
mean = 0.1
max = 0.5
scale = auto

[sweep.train.max_grad_norm]
distribution = uniform
min = 0.1
mean = 1.0
max = 3.0
scale = auto
